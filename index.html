<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DragonForge Link - HTML5 Demo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#1a0f0a, #2c1810);
            color: #f4d9a0;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        .header {
            width: 100%;
            max-width: 820px;
            padding: 15px 10px;
            text-align: center;
        }
        
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            color: #ffd700;
            text-shadow: 0 0 20px #c8102e, 2px 2px 0 #8c0a1f;
            margin: 0;
        }
        
        .game-container {
            width: 100%;
            max-width: 820px;
            margin: 10px auto;
            background: #1f140f;
            border: 6px solid #c5a26f;
            border-radius: 14px;
            box-shadow: 0 0 30px rgba(200, 16, 46, 0.5);
            overflow: hidden;
        }
        
        .reels {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 16px;
            background: #0d0704;
        }
        
        .reel {
            background: #2c1810;
            border: 3px solid #c5a26f;
            border-radius: 8px;
            overflow: hidden;
            height: 380px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            position: relative;
        }
        
        .symbol {
            width: 100%;
            height: 126.66px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-bottom: 2px solid #5c4033;
            position: relative;
        }
        
        .symbol:last-child {
            border-bottom: none;
        }
        
        .controls {
            padding: 16px;
            background: #2c1810;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            border-top: 4px solid #c5a26f;
        }
        
        button {
            background: linear-gradient(#c8102e, #8c0a1f);
            color: #ffd700;
            border: 3px solid #ffd700;
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        button:hover { transform: scale(1.05); }
        
        .bet-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.4rem;
        }
        
        .status {
            text-align: center;
            font-size: 1.35rem;
            margin: 8px 0;
            min-height: 36px;
            color: #ffd700;
        }
        
        .info-panel {
            width: 100%;
            max-width: 820px;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            margin-bottom: 8px;
        }
        
        .balance, .win {
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 8px;
            border: 2px solid #c5a26f;
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .lock-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffd700;
            color: #c8102e;
            padding: 1px 7px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">DRAGONFORGE LINK</h1>
    </div>

    <div class="game-container">
        <div class="reels" id="reels"></div>
        
        <div class="status" id="status">Welcome to DragonForge Link • Press SPIN</div>
        
        <div class="controls">
            <div class="bet-controls">
                <button onclick="changeBet(-1)">−</button>
                <span id="bet-display" style="font-weight:bold; min-width:70px; text-align:center;">50</span>
                <button onclick="changeBet(1)">+</button>
                <span style="font-size:0.9rem; margin-left:6px;">credits</span>
            </div>
            
            <button id="spin-btn" onclick="spin()" style="font-size:1.5rem; padding:14px 42px;">SPIN</button>
            <button onclick="autoSpin()" style="background:#5c4033; border-color:#c5a26f;">AUTO</button>
        </div>
    </div>

    <div class="info-panel">
        <div class="balance">Balance: <span id="balance">10000</span></div>
        <div class="win">Win: <span id="last-win">0</span></div>
    </div>

    <script>
        const CONFIG = {
            reels: 5,
            rows: 3,
            symbols: ['DRAGON', 'ORB', 'COIN', 'LANTERN', 'WILD', 'SCAT1', 'SCAT2']
        };

        let balance = 10000;
        let currentBet = 50;
        let isSpinning = false;

        function initReels() {
            const container = document.getElementById('reels');
            container.innerHTML = '';
            
            for (let r = 0; r < CONFIG.reels; r++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                reel.id = `reel-${r}`;
                
                for (let row = 0; row < CONFIG.rows; row++) {
                    const symbol = document.createElement('div');
                    symbol.className = 'symbol';
                    symbol.id = `symbol-${r}-${row}`;
                    reel.appendChild(symbol);
                }
                container.appendChild(reel);
            }
            
            for (let r = 0; r < CONFIG.reels; r++) {
                for (let row = 0; row < CONFIG.rows; row++) {
                    setSymbol(r, row, getRandomSymbol());
                }
            }
        }

        function getRandomSymbol() {
            return CONFIG.symbols[Math.floor(Math.random() * CONFIG.symbols.length)];
        }

        function setSymbol(reel, row, symbol) {
            const el = document.getElementById(`symbol-${reel}-${row}`);
            if (!el) return;

            el.innerHTML = '';
            el.style.backgroundImage = '';
            el.style.background = '#2c1810';

            const imageMap = {
                'ORB': './imagine_images/7WVtD.jpg',
                'DRAGON': './imagine_images/XLwVk.jpg',
                'COIN': './imagine_images/emapH.jpg',
                'LANTERN': './imagine_images/IlA7r.jpg',
                'WILD': './imagine_images/XBGCg.jpg'
            };

            if (imageMap[symbol]) {
                el.style.backgroundImage = `url('${imageMap[symbol]}')`;
                el.style.backgroundSize = 'cover';
                el.style.backgroundPosition = 'center';
                
                if (symbol === 'ORB') {
                    const badge = document.createElement('div');
                    badge.className = 'lock-badge';
                    badge.textContent = 'HOLD';
                    el.appendChild(badge);
                }
            } else {
                const colors = { 'SCAT1': '#c8102e', 'SCAT2': '#ffaa00' };
                el.style.background = colors[symbol] || '#3a2a1f';
                el.innerHTML = getEmoji(symbol);
            }
        }

        function getEmoji(symbol) {
            const map = {
                'DRAGON': '🐉', 'ORB': '🔥', 'COIN': '💰',
                'LANTERN': '🏮', 'WILD': '★', 'SCAT1': '🧧', 'SCAT2': '⚡'
            };
            return `<span style="font-size:3.2rem; filter:drop-shadow(2px 2px 3px black);">${map[symbol] || '?'}</span>`;
        }

        async function animateReel(reelIndex, finalSymbols) {
            const reelEl = document.getElementById(`reel-${reelIndex}`);
            if (!reelEl) return;

            for (let i = 0; i < 7; i++) {
                for (let row = 0; row < CONFIG.rows; row++) {
                    setSymbol(reelIndex, row, getRandomSymbol());
                }
                await new Promise(r => setTimeout(r, 55));
            }

            for (let row = 0; row < CONFIG.rows; row++) {
                setSymbol(reelIndex, row, finalSymbols[row]);
            }
        }

        async function spin() {
            if (isSpinning || balance < currentBet) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('status').textContent = 'SPINNING...';

            balance -= currentBet;
            updateUI();

            const outcome = generateOutcome();

            const promises = [];
            for (let r = 0; r < CONFIG.reels; r++) {
                promises.push(animateReel(r, outcome.grid[r]));
            }
            await Promise.all(promises);

            processOutcome(outcome);
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
        }

        function generateOutcome() {
            let grid = [];
            let totalWin = 0;
            let bonusType = null;

            for (let r = 0; r < CONFIG.reels; r++) {
                let col = [];
                for (let row = 0; row < CONFIG.rows; row++) {
                    let sym = getRandomSymbol();
                    if (Math.random() < 0.11) sym = 'SCAT2';
                    if (Math.random() < 0.07) sym = 'SCAT1';
                    if (Math.random() < 0.05) sym = 'DRAGON';
                    col.push(sym);
                }
                grid.push(col);
            }

            let scat2 = 0;
            grid.forEach(c => c.forEach(s => { if (s === 'SCAT2') scat2++; }));

            if (scat2 >= 6) {
                bonusType = 'holdAndSpin';
                totalWin = currentBet * 30;
            } else {
                let scat1 = 0;
                grid.forEach(c => c.forEach(s => { if (s === 'SCAT1') scat1++; }));
                if (scat1 >= 3) {
                    bonusType = 'freeGames';
                    totalWin = currentBet * 10;
                } else {
                    totalWin = calculateWin(grid);
                }
            }

            return { grid, totalWin, bonusType, scat2Count: scat2 };
        }

        function calculateWin(grid) {
            let win = 0;
            const mid = grid.map(c => c[1]);
            for (let i = 0; i < 3; i++) {
                if (mid[i] === mid[i+1] && mid[i] === mid[i+2] && !['SCAT1','SCAT2'].includes(mid[i])) {
                    win += currentBet * 4;
                }
            }
            return Math.floor(win);
        }

        function processOutcome(outcome) {
            document.getElementById('last-win').textContent = outcome.totalWin;
            balance += outcome.totalWin;
            updateUI();

            let msg = `Win: ${outcome.totalWin} credits`;
            if (outcome.bonusType === 'holdAndSpin') {
                msg = `HOLD & SPIN! (${outcome.scat2Count} Orbs locked)`;
                triggerHoldAndSpin(outcome.grid);
            } else if (outcome.bonusType === 'freeGames') {
                msg = `FREE GAMES TRIGGERED!`;
            }
            document.getElementById('status').textContent = msg;
        }

        function triggerHoldAndSpin(gridData) {
            setTimeout(() => {
                for (let r = 0; r < CONFIG.reels; r++) {
                    for (let row = 0; row < CONFIG.rows; row++) {
                        if (gridData[r][row] === 'SCAT2' || gridData[r][row] === 'ORB') {
                            const el = document.getElementById(`symbol-${r}-${row}`);
                            if (el) {
                                const badge = document.createElement('div');
                                badge.className = 'lock-badge';
                                badge.textContent = 'LOCKED';
                                el.appendChild(badge);
                            }
                        }
                    }
                }
                document.getElementById('status').textContent = 'HOLD & SPIN COMPLETE • Big win!';
                balance += currentBet * 45;
                updateUI();
            }, 1200);
        }

        function changeBet(delta) {
            currentBet = Math.max(25, Math.min(500, currentBet + delta * 25));
            document.getElementById('bet-display').textContent = currentBet;
        }

        function updateUI() {
            document.getElementById('balance').textContent = balance.toLocaleString();
            document.getElementById('bet-display').textContent = currentBet;
        }

        function autoSpin() {
            if (isSpinning) return;
            let count = 0;
            const iv = setInterval(() => {
                if (count++ >= 4 || balance < currentBet) { clearInterval(iv); return; }
                spin();
            }, 2800);
        }

        function initGame() {
            initReels();
            updateUI();
            
            document.querySelector('.title').addEventListener('click', () => {
                balance += 300;
                updateUI();
            });
            
            document.addEventListener('keydown', e => {
                if ((e.key === ' ' || e.key === 'Enter') && !isSpinning) {
                    e.preventDefault();
                    spin();
                }
            });
        }

        window.onload = initGame;
    </script>
</body>
</html>
